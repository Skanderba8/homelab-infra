- name: Configure homelab server
  hosts: homelab
  become: true

  tasks:

    # ── SYSTEM SETUP ─────────────────────────────────────────────────────────

    - name: Update apt cache
      apt:
        update_cache: yes

    - name: Install prerequisites
      apt:
        name:
          - ca-certificates
          - curl
          - gnupg
          - python3-pip
        state: present
    
    - name: Install AWS CLI
      pip:
        name: awscli
        executable: pip3
        extra_args: "--break-system-packages" 

    - name: Create keyrings directory
      file:
        path: /etc/apt/keyrings
        state: directory
        mode: '0755'

    - name: Add Docker GPG key
      shell: |
        curl -fsSL https://download.docker.com/linux/ubuntu/gpg | \
        gpg --dearmor -o /etc/apt/keyrings/docker.gpg
      args:
        creates: /etc/apt/keyrings/docker.gpg

    - name: Add Docker repository
      shell: |
        echo "deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/docker.gpg] \
        https://download.docker.com/linux/ubuntu $(. /etc/os-release && echo $VERSION_CODENAME) stable" | \
        tee /etc/apt/sources.list.d/docker.list > /dev/null
      args:
        creates: /etc/apt/sources.list.d/docker.list

    - name: Update apt cache after adding Docker repo
      apt:
        update_cache: yes

    - name: Install Docker
      apt:
        name:
          - docker-ce
          - docker-ce-cli
          - containerd.io
          - docker-compose-plugin
          - git
        state: present

    - name: Add ubuntu user to docker group
      user:
        name: ubuntu
        groups: docker
        append: yes


    # ── APP DEPLOYMENT ────────────────────────────────────────────────────────

    - name: Clone homelab repo
      git:
        repo: https://github.com/Skanderba8/homelab
        dest: /home/ubuntu/homelab
        update: yes
      become_user: ubuntu

    - name: Fetch secrets from AWS Secrets Manager
      shell: |
        aws secretsmanager get-secret-value \
          --secret-id homelab/env \
          --region {{ aws_region }} \
          --query SecretString \
          --output text
      register: secret_value

    - name: Create .env file from Secrets Manager
      copy:
        dest: /home/ubuntu/homelab/.env
        owner: ubuntu
        group: ubuntu
        mode: '0600'
        content: |
          {% set secret = secret_value.stdout | from_json %}
          POSTGRES_USER={{ secret.POSTGRES_USER }}
          POSTGRES_PASSWORD={{ secret.POSTGRES_PASSWORD }}
          POSTGRES_DB={{ secret.POSTGRES_DB }}
          DATABASE_URL={{ secret.DATABASE_URL }}
          ECR_REPOSITORY_URL={{ aws_account_id }}.dkr.ecr.{{ aws_region }}.amazonaws.com/homelab
          GRAFANA_PASSWORD={{ secret.GRAFANA_PASSWORD }}

    - name: Authenticate Docker to ECR
      shell: |
        aws ecr get-login-password --region {{ aws_region }} | \
        docker login --username AWS --password-stdin \
        {{ aws_account_id }}.dkr.ecr.{{ aws_region }}.amazonaws.com
      become_user: ubuntu

    - name: Reset SSH connection to pick up docker group
      meta: reset_connection

    - name: Check if ECR image exists
      shell: |
        aws ecr describe-images \
          --repository-name homelab \
          --region {{ aws_region }} \
          --image-ids imageTag=latest \
          --query 'length(imageDetails)' \
          --output text 2>/dev/null || echo "0"
      register: ecr_image_check
      become_user: ubuntu

    # ── TRIGGER GITHUB ACTIONS DEPLOY ────────────────────────────────────────

    - name: Trigger GitHub Actions deploy workflow
      uri:
        url: "https://api.github.com/repos/Skanderba8/homelab/actions/workflows/deploy.yml/dispatches"
        method: POST
        headers:
          Authorization: "Bearer {{ github_token }}"
          Accept: "application/vnd.github+json"
          X-GitHub-Api-Version: "2022-11-28"
        body_format: json
        body:
          ref: "main"
          inputs:
            force_build: "true"
        status_code: 204
      delegate_to: localhost
      become: false
      vars:
        ansible_become: false