- name: Configure homelab server
  hosts: homelab
  become: true

  tasks:
    - name: Update apt cache
      apt:
        update_cache: yes

    - name: Install prerequisites
      apt:
        name:
          - ca-certificates
          - curl
          - gnupg
        state: present

    - name: Create keyrings directory
      file:
        path: /etc/apt/keyrings
        state: directory
        mode: '0755'

    - name: Add Docker GPG key
      shell: |
        curl -fsSL https://download.docker.com/linux/ubuntu/gpg | \
        gpg --dearmor -o /etc/apt/keyrings/docker.gpg
      args:
        creates: /etc/apt/keyrings/docker.gpg

    - name: Add Docker repository
      shell: |
        echo "deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/docker.gpg] \
        https://download.docker.com/linux/ubuntu $(. /etc/os-release && echo $VERSION_CODENAME) stable" | \
        tee /etc/apt/sources.list.d/docker.list > /dev/null
      args:
        creates: /etc/apt/sources.list.d/docker.list

    - name: Update apt cache after adding Docker repo
      apt:
        update_cache: yes

    - name: Install Docker
      apt:
        name:
          - docker-ce
          - docker-ce-cli
          - containerd.io
          - docker-compose-plugin
          - git
        state: present

    - name: Add ubuntu user to docker group
      user:
        name: ubuntu
        groups: docker
        append: yes

    - name: Clone homelab repo
      git:
        repo: https://github.com/Skanderba8/homelab
        dest: /home/ubuntu/homelab
        update: yes
      become_user: ubuntu

    - name: Reset SSH connection to pick up docker group
      meta: reset_connection

    - name: Start containers
      shell: docker compose up -d --build
      args:
        chdir: /home/ubuntu/homelab
      become_user: ubuntu

    - name: Create runner directory
      file:
        path: /home/ubuntu/actions-runner
        state: directory
        owner: ubuntu
        group: ubuntu
        mode: '0755'

    - name: Download GitHub Actions runner
      get_url:
        url: https://github.com/actions/runner/releases/download/v2.317.0/actions-runner-linux-x64-2.317.0.tar.gz
        dest: /home/ubuntu/actions-runner/actions-runner.tar.gz
      become_user: ubuntu

    - name: Extract runner
      unarchive:
        src: /home/ubuntu/actions-runner/actions-runner.tar.gz
        dest: /home/ubuntu/actions-runner/
        remote_src: yes
      become_user: ubuntu

    - name: Configure GitHub Actions runner
      shell: |
        ./config.sh --url https://github.com/Skanderba8/homelab \
          --token {{ github_runner_token }} \
          --name "ec2-runner" \
          --labels "self-hosted,ec2" \
          --unattended \
          --replace
      args:
        chdir: /home/ubuntu/actions-runner
      become_user: ubuntu

    - name: Install runner as systemd service
      shell: ./svc.sh install ubuntu
      args:
        chdir: /home/ubuntu/actions-runner

    - name: Start runner service
      shell: ./svc.sh start
      args:
        chdir: /home/ubuntu/actions-runner