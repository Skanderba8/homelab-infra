# This entire playbook runs against the server defined in inventory.ini
# "become: true" means run all tasks as root (sudo) by default
- name: Configure homelab server
  hosts: homelab
  become: true

  tasks:

    # ── SYSTEM SETUP ─────────────────────────────────────────────────────────

    - name: Update apt cache
      apt:
        update_cache: yes

    - name: Install prerequisites
      # These are needed to add Docker's external apt repository securely
      # ca-certificates: verifies HTTPS connections
      # curl: downloads files
      # gnupg: verifies the Docker GPG signature
      apt:
        name:
          - ca-certificates
          - curl
          - gnupg
        state: present

    - name: Create keyrings directory
      # This folder holds trusted GPG keys for external apt repos
      file:
        path: /etc/apt/keyrings
        state: directory
        mode: '0755'

    - name: Add Docker GPG key
      # Downloads Docker's official GPG key and converts it to binary format
      # "creates:" means: skip this task if the file already exists (idempotent)
      shell: |
        curl -fsSL https://download.docker.com/linux/ubuntu/gpg | \
        gpg --dearmor -o /etc/apt/keyrings/docker.gpg
      args:
        creates: /etc/apt/keyrings/docker.gpg

    - name: Add Docker repository
      # Adds Docker's official apt repo so we get the real Docker, not Ubuntu's
      # outdated version. "creates:" skips if already added.
      shell: |
        echo "deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/docker.gpg] \
        https://download.docker.com/linux/ubuntu $(. /etc/os-release && echo $VERSION_CODENAME) stable" | \
        tee /etc/apt/sources.list.d/docker.list > /dev/null
      args:
        creates: /etc/apt/sources.list.d/docker.list

    - name: Update apt cache after adding Docker repo
      # Refresh apt so it sees the new Docker repo we just added
      apt:
        update_cache: yes

    - name: Install Docker
      # docker-ce: the Docker engine
      # docker-ce-cli: the "docker" command line tool
      # containerd.io: the container runtime Docker uses under the hood
      # docker-compose-plugin: makes "docker compose" work (the modern version)
      # git: needed to clone your repo
      apt:
        name:
          - docker-ce
          - docker-ce-cli
          - containerd.io
          - docker-compose-plugin
          - git
        state: present

    - name: Add ubuntu user to docker group
      # Without this, running "docker" commands requires sudo every time
      # "append: yes" means add to this group without removing existing groups
      user:
        name: ubuntu
        groups: docker
        append: yes


    # ── APP DEPLOYMENT ────────────────────────────────────────────────────────

    - name: Clone homelab repo
      # Clones your app repo into /home/ubuntu/homelab
      # "update: yes" means if it already exists, do a git pull instead
      # "become_user: ubuntu" drops from root to ubuntu for this task
      # so files are owned by ubuntu, not root
      git:
        repo: https://github.com/Skanderba8/homelab
        dest: /home/ubuntu/homelab
        update: yes
      become_user: ubuntu

    - name: Create .env file
      # docker-compose.yml uses ${VARIABLE} syntax and expects a .env file
      # in the same directory. This file is never in git (it's gitignored).
      # Ansible creates it here from the variables you pass via --extra-vars @vars.yml
      # mode '0600' means only the owner (ubuntu) can read or write it — not other users
      copy:
        dest: /home/ubuntu/homelab/.env
        owner: ubuntu
        group: ubuntu
        mode: '0600'
        content: |
          POSTGRES_USER={{ postgres_user }}
          POSTGRES_PASSWORD={{ postgres_password }}
          POSTGRES_DB={{ postgres_db }}
          DATABASE_URL=postgresql://{{ postgres_user }}:{{ postgres_password }}@db:5432/{{ postgres_db }}

    - name: Reset SSH connection to pick up docker group
      # The ubuntu user was just added to the docker group above, but that
      # change only takes effect in NEW sessions. This resets the SSH connection
      # so the next tasks run in a fresh session where ubuntu is in docker group.
      # Without this, "docker compose" would fail with a permission error.
      meta: reset_connection

    - name: Start containers
      # Starts all services defined in docker-compose.yml
      # "-d" means detached (runs in background)
      # "--build" means rebuild the backend image from Dockerfile
      # Docker Compose automatically loads .env from the same directory
      shell: docker compose up -d --build
      args:
        chdir: /home/ubuntu/homelab
      become_user: ubuntu


    # ── GITHUB ACTIONS RUNNER ─────────────────────────────────────────────────

    - name: Create runner directory
      file:
        path: /home/ubuntu/actions-runner
        state: directory
        owner: ubuntu
        group: ubuntu
        mode: '0755'

    - name: Download GitHub Actions runner
      # Downloads the runner binary from GitHub releases
      # This is the agent that listens for CI/CD jobs and runs them on this EC2
      get_url:
        url: https://github.com/actions/runner/releases/download/v2.317.0/actions-runner-linux-x64-2.317.0.tar.gz
        dest: /home/ubuntu/actions-runner/actions-runner.tar.gz
      become_user: ubuntu

    - name: Extract runner
      # "remote_src: yes" means the tar.gz is already on the EC2, not on your machine
      unarchive:
        src: /home/ubuntu/actions-runner/actions-runner.tar.gz
        dest: /home/ubuntu/actions-runner/
        remote_src: yes
      become_user: ubuntu

    - name: Check if runner already configured
      # Checks if .credentials file exists — GitHub writes this file after
      # successful registration. If it exists, runner is already registered.
      # Result is stored in "runner_credentials" variable for the next task.
      stat:
        path: /home/ubuntu/actions-runner/.credentials
      register: runner_credentials

    - name: Configure GitHub Actions runner
      # Registers this EC2 as a trusted runner with your GitHub repo
      # Requires a token that proves you have admin access to the repo
      # Token expires after 1 hour — always fetch a fresh one before running
      # "--unattended" skips interactive prompts
      # "--replace" re-registers if a runner with this name already exists
      # "when:" skips this task if .credentials already exists (already registered)
      # Since you terraform destroy+apply every time, this will always run —
      # but the check is good practice if you ever re-run on an existing server
      shell: |
        ./config.sh --url https://github.com/Skanderba8/homelab \
          --token {{ github_runner_token }} \
          --name "ec2-runner" \
          --labels "self-hosted,ec2" \
          --unattended \
          --replace
      args:
        chdir: /home/ubuntu/actions-runner
      become_user: ubuntu
      when: not runner_credentials.stat.exists

    - name: Install runner as systemd service
      # systemd is Linux's service manager — it controls what starts on boot
      # This makes the runner a proper service that survives reboots
      # "svc.sh install ubuntu" means: install the service, run it as the ubuntu user
      shell: ./svc.sh install ubuntu
      args:
        chdir: /home/ubuntu/actions-runner
      when: not runner_service.stat.exists   # skip if service file already exists


    - name: Start runner service
      # Starts the runner service right now (don't wait for reboot)
      shell: ./svc.sh start
      args:
        chdir: /home/ubuntu/actions-runner
      when: not runner_service.stat.exists   # skip if already running
